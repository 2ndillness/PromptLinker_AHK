<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Prompt Linker</title>
  </head>

  <body>
    <div id="content-area">
      <div id="main-view">
        <!-- ツールバー -->
        <div class="toolbar">
          <button id="link-btn" onclick="sendMsg('toggleLink')">
            <span class="icon-placeholder" data-icon="link"></span>
            <span class="btn-text">Link Target</span>
          </button>
          <!-- メイン画面用プリセット呼び出しボタン -->
          <div class="main-presets">
            <button
              class="preset-call-btn"
              onclick="sendMsg('applyPreset:1')"
              title="Apply Preset 1"
            >
              1
            </button>
            <button
              class="preset-call-btn"
              onclick="sendMsg('applyPreset:2')"
              title="Apply Preset 2"
            >
              2
            </button>
            <button
              class="preset-call-btn"
              onclick="sendMsg('applyPreset:3')"
              title="Apply Preset 3"
            >
              3
            </button>
          </div>

          <!-- ドロップダウンメニュー -->
          <div class="select-wrapper">
            <select
              id="target-action"
              onchange="sendMsg('updateSetting:TargetAction:' + this.value)"
              title="Target Action"
            >
              <option value="Enter">Enter</option>
              <option value="Ctrl + Enter">Ctrl + Enter</option>
              <option value="Shift + Enter">Shift + Enter</option>
              <option value="Paste Only">Paste Only</option>
            </select>
            <span
              class="icon-placeholder select-arrow"
              data-icon="chevron-down"
            >
            </span>
          </div>
          <button id="settings-btn" onclick="toggleSetView()" title="Settings">
            <span class="icon-placeholder" data-icon="settings"></span>
          </button>
        </div>

        <textarea id="main-textarea"></textarea>
      </div>

      <!-- 設定画面 -->
      <div id="settings-view" class="hidden">
        <div class="settings-header">
          <button class="back-btn" onclick="toggleSetView()">
            <span class="icon-placeholder" data-icon="arrow-left"></span>
            Back
          </button>
          <h3>Settings</h3>
        </div>

        <!--プリセット保存 -->
        <div class="setting-row">
          <label>Window Presets</label>
          <div class="preset-controls">
            <button
              class="preset-save-tile"
              onclick="sendMsg('savePreset:1')"
              title="Save  to Preset 1"
            >
              <span class="icon-placeholder" data-icon="save"></span>
              <span class="preset-label">Preset 1</span>
            </button>
            <button
              class="preset-save-tile"
              onclick="sendMsg('savePreset:2')"
              title="Save  to Preset 2"
            >
              <span class="icon-placeholder" data-icon="save"></span>
              <span class="preset-label">Preset 2</span>
            </button>
            <button
              class="preset-save-tile"
              onclick="sendMsg('savePreset:3')"
              title="Save  to Preset 3"
            >
              <span class="icon-placeholder" data-icon="save"></span>
              <span class="preset-label">Preset 3</span>
            </button>
          </div>
        </div>

        <div class="setting-row">
          <label>Trigger Key</label>
          <div class="select-wrapper mini">
            <select
              id="trigger-key"
              onchange="sendMsg('updateSetting:TriggerKey:' + this.value)"
            >
              <option value="Ctrl + Enter">Ctrl + Enter</option>
              <option value="Shift + Enter">Shift + Enter</option>
            </select>
            <span
              class="icon-placeholder select-arrow"
              data-icon="chevron-down"
            ></span>
          </div>
        </div>

        <div class="setting-row">
          <label>Font Size</label>
          <div class="num-control">
            <button onclick="sendMsg('changeFontSize:-1')">-</button>
            <span id="font-size-val">14</span>
            <button onclick="sendMsg('changeFontSize:1')">+</button>
          </div>
        </div>

        <div class="setting-row">
          <label>After Minimize</label>
          <label class="switch">
            <input
              type="checkbox"
              id="minimize-after-check"
              onchange="
                sendMsg(
                  'updateSetting:MinimizeAfter:' + (this.checked ? '1' : '0'),
                )
              "
            />
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <label>Save Log</label>
          <label class="switch">
            <input
              type="checkbox"
              id="save-log-check"
              onchange="
                sendMsg('updateSetting:SaveLog:' + (this.checked ? '1' : '0'))
              "
            />
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <label>Restore Hotkey</label>
          <div class="input-group">
            <div class="explanation">Press keys to set.</div>
            <input
              type="text"
              id="hotkey-input"
              class="hotkey-input"
              placeholder="Press keys (e.g. Ctrl+Alt+L)"
              readonly
            />
            <button onclick="resetHotkey()" title="Reset to Default">
              <span class="icon-placeholder" data-icon="arrow-left"></span>
            </button>
          </div>
        </div>

        <div class="setting-row">
          <label>Log Directory</label>
          <div class="input-group expand">
            <input type="text" id="log-dir-display" readonly value="C:\..." />
            <button onclick="sendMsg('selectLogDir')" title="Browse...">
              <span class="icon-placeholder" data-icon="folder"></span>
            </button>
          </div>
        </div>

        <div class="action-row">
          <button onclick="sendMsg('openLogDir')">
            <span class="icon-placeholder" data-icon="folder-open"></span>
            Open Folder
          </button>
          <button onclick="sendMsg('viewLatestLog')">
            <span class="icon-placeholder" data-icon="file-text"></span>
            View Log
          </button>
        </div>
      </div>
    </div>
    <!-- 右クリックメニュー -->
    <div id="context-menu" class="context-menu">
      <div class="menu-item" onclick="execCmd('cut')">Cut</div>
      <div class="menu-item" onclick="execCmd('copy')">Copy</div>
      <div class="menu-item" onclick="execCmd('paste')">Paste</div>
      <div class="separator"></div>
      <div class="menu-item" onclick="execCmd('selectAll')">Select All</div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="icons.js"></script>
    <script src="script.js"></script>
  </body>
</html>
