<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #007acc;
            --input-bg: #2d2d2d;
            --font-family: 'Segoe UI', 'Meiryo', sans-serif;
            --toolbar-height: 50px;
            --border-color: #444;
        }
        .toolbar {
            display: flex;
            align-items: center;
            padding-bottom: 10px;
            gap: 15px;
        }
        .status-label {
            font-weight: bold;
            font-size: 14px;
            color: #cc0000;
        }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 2rem);
            box-sizing: border-box;
            overflow: hidden;
        }
        button {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px 15px;
            cursor: pointer;
            font-family: var(--font-family);
            border-radius: 3px;
        }
        button:hover { background-color: #3e3e3e; }
        button:active { background-color: #005a9e; }

        select {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px;
            border-radius: 3px;
        }
        textarea {
            flex-grow: 1;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-size: 16px;
            font-family: var(--font-family);
            resize: none;
            outline: none;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #252526;
            border: 1px solid #454545;
            width: 80%;
            max-width: 400px;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .modal-header h3 { margin: 0; color: var(--accent-color); }
        .close-btn { color: #aaa; font-size: 24px; cursor: pointer; }
        .close-btn:hover { color: #fff; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .setting-row label { font-size: 14px; }
        .path-display {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            color: #888;
            font-size: 12px;
            padding: 5px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="link-btn" onclick="sendMsg('toggleLink')">Link Target</button>

        <select id="send-mode" onchange="sendMsg('updateSetting:SendMode:' + this.value)">
            <option value="Enter">Enter</option>
            <option value="Ctrl + Enter">Ctrl + Enter</option>
            <option value="Shift + Enter">Shift + Enter</option>
            <option value="Paste + Min">Paste + Min</option>
            <option value="Paste Only">Paste Only</option>
        </select>

        <button id="settings-btn" onclick="openModal()" title="Settings">⚙</button>

        <span id="status-label" class="status-label">Disconnected</span>
    </div>

    <textarea id="main-textarea" placeholder="プロンプトをここに入力..."></textarea>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>

            <div class="setting-row">
                <label>Font Size: <span id="font-size-val">14</span>px</label>
                <div>
                    <button onclick="sendMsg('changeFontSize:-1')">-</button>
                    <button onclick="sendMsg('changeFontSize:1')">+</button>
                </div>
            </div>

            <div class="setting-row">
                <label>Save Log</label>
                <input type="checkbox" id="save-log-check" onchange="sendMsg('updateSetting:SaveLog:' + (this.checked ? '1' : '0'))">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Log Directory:</label>
                <div id="log-dir-display" class="path-display">C:\...</div>
                <button onclick="sendMsg('selectLogDir')" style="width: 100%;">Browse...</button>
            </div>

            <div class="setting-row" style="margin-top: 20px; justify-content: flex-end; gap: 10px;">
                <button onclick="sendMsg('openLogDir')">Open Folder</button>
                <button onclick="sendMsg('viewLatestLog')">View Log</button>
            </div>
        </div>
    </div>

    <script>
        const textArea = document.getElementById('main-textarea');
        const modal = document.getElementById('settings-modal');

        // AHKから注入される設定値を受け取る変数（初期値は仮）
        let ahkSettings = { SendMode: 'Enter', FontSize: 14, SaveLog: true, LogDir: 'Unknown' };

        // AHKから設定を受け取ってUIに反映する関数
        function initSettings(settings) {
            ahkSettings = settings;

            // SendMode
            document.getElementById('send-mode').value = settings.SendMode;
            // FontSize
            updateFontSizeDisplay(settings.FontSize);
            // SaveLog
            document.getElementById('save-log-check').checked = settings.SaveLog;
            // LogDir
            document.getElementById('log-dir-display').innerText = settings.LogDir;
        }

        function sendMsg(msg) {
            window.chrome.webview.postMessage(msg);
        }

        function updateBtn(text) {
            document.getElementById('link-btn').innerText = text;
        }

        function updateStatus(text, color) {
            const el = document.getElementById('status-label');
            el.innerText = text;
            el.style.color = color;
        }

        function updateFontSizeDisplay(size) {
            document.getElementById('font-size-val').innerText = size;
            textArea.style.fontSize = size + 'px';
        }

        function updateLogDirDisplay(path) {
            document.getElementById('log-dir-display').innerText = path;
        }

        // Modal Control
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; textArea.focus(); }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        textArea.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendMsg('transfer:' + textArea.value);
            }
        });

        // AHK_SETTINGS_INJECTION_PLACEHOLDER

        textArea.focus();
    </script>
</body>
</html>
